<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Form Table</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      padding: 30px;
    }

    table {
      width: 80%;
      margin: auto;
      border-collapse: collapse;
      background-color: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    th, td {
      padding: 12px 15px;
      text-align: center;
      border: 1px solid #ccc;
    }

    th {
      background-color: #4CAF50;
      color: white;
    }

    input[type="text"] {
      padding: 5px;
      width: 90%;
    }

    input[type="submit"] {
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 4px;
    }

    input[type="submit"]:hover {
      background-color: #45a049;
    }

    select {
      padding: 5px;
      width: 90%;
    }
  </style>
</head>
<body>

  <table>
    <tr>
      <th>Name</th>
      <th>Gender</th>
      <th>Hobbies</th>
      <th>Country</th>
      <th>Submit</th>
    </tr>
    <tr>
      <form>
        <td rowspan="1"><input type="text" name="name" placeholder="Enter name"></td>
        <td>
          <label><input type="radio" name="gender" value="male"> Male</label>
          <label><input type="radio" name="gender" value="female"> Female</label>
        </td>
        <td>
          <label><input type="checkbox" name="hobby" value="reading"> Reading</label><br>
          <label><input type="checkbox" name="hobby" value="music"> Music</label>
        </td>
        <td>
          <select name="country">
            <option value="nepal">Nepal</option>
            <option value="india">India</option>
            <option value="usa">USA</option>
            <option value="other">Other</option>
          </select>
        </td>
        <td><input type="submit" value="Submit"></td>
        <tr>
         <td rowspan="2">Subject:</td>
         <td><input type="checkbox"> Math</td>
       </tr>
       <tr>
           <td><input type="checkbox"> Science</td>
       </tr>
</form>
</tr>
</table>

</body>
</html>
