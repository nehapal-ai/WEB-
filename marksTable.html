<!DOCTYPE html>
<html>
<head>
    <title>Student Marks Table</title>
    <style>
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
            text-align: center;
            padding: 5px;
        }
        caption {
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

            <th>C</th>

        </tr>

        </tr>
        <tr>
            <td>2</td>
            <td>Susree</td>
            <td>80</td>
            <td>45</td>
            <td>NQ</td>
            <td>55</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Yodhin</td>
            <td>80</td>
            <td>85</td>

        </tr>
        <tr ><th colspan="6"><b>Contact to department if Not Qualified (NQ)</b></th>
        </tr>
    </table>


</body>
</html>
